services:
  - type: web
    name: presight-dashboard
    runtime: node
    plan: free
    branch: master
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm -r build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
